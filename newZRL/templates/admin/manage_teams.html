{% extends "base.html" %}

{% block title %}Gestione Team{% endblock %}
{% block page_title %}Gestione Team{% endblock %}

{% block content %}
<!-- 🔧 Aggiungi nuovo team -->
<div class="card shadow-sm mb-4">
  <div class="card-header bg-primary text-white">➕ Aggiungi Nuovo Team</div>
  <div class="card-body">
    <form method="POST" action="{{ url_for('admin.manage_teams') }}">
      <input type="hidden" name="action" value="create">
      <div class="row g-2 align-items-end">
        <div class="col-auto">
          <label class="form-label">Nome Team:</label>
          <input type="text" name="name" class="form-control form-control-sm" required>
        </div>
        <div class="col-auto">
          <label class="form-label">Categoria:</label>
          <select name="category" class="form-select form-select-sm" required>
            {% for cat in ['A','B','C','D'] %}
              <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-auto">
          <label class="form-label">Divisione:</label>
          <select name="division" class="form-select form-select-sm" required>
            {% for div in ['1','2','3','4'] %}
              <option value="{{ div }}">{{ div }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-auto">
          <label class="form-label">League:</label>
          <select name="league_id" class="form-select form-select-sm">
            <option value="">-- Nessuna --</option>
            {% for league in leagues %}
              <option value="{{ league.id }}">{{ league.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-auto">
          <label class="form-label">Capitano:</label>
          <select name="captain_id" class="form-select form-select-sm">
            <option value="">-- Nessuno --</option>
            {% for captain in captains %}
              <option value="{{ captain.zwift_power_id }}">{{ captain.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-auto">
          <button type="submit" class="btn btn-success btn-sm">➕ Aggiungi Team</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- 📋 Team esistenti -->
<div class="card shadow-sm">
  <div class="card-header bg-secondary text-white">📋 Team Esistenti</div>
  <div class="card-body">
    <table class="table table-bordered table-sm mb-0 align-middle">
      <thead class="table-light">
        <tr>
          <th>Nome</th>
          <th>Cat.</th>
          <th>Div.</th>
          <th>League</th>
          <th>Capitano</th>
          <th>Gestione</th>
          <th>Salva</th>
          <th>Elimina</th>
        </tr>
      </thead>
      <tbody>
        {% for team in teams %}
        <tr>
          <form method="POST" action="{{ url_for('admin.manage_teams') }}">
            <input type="hidden" name="action" value="update">
            <input type="hidden" name="team_id" value="{{ team.id }}">
            <td>
              <input type="text" name="name" value="{{ team.name }}" class="form-control form-control-sm" required>
            </td>
            <td>
              <select name="category" class="form-select form-select-sm" required>
                {% for cat in ['A','B','C','D'] %}
                  <option value="{{ cat }}" {% if team.category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
              </select>
            </td>
            <td>
              <select name="division" class="form-select form-select-sm" required>
                {% for div in ['1','2','3','4'] %}
                  <option value="{{ div }}" {% if team.division == div %}selected{% endif %}>{{ div }}</option>
                {% endfor %}
              </select>
            </td>
            <td>
              <select name="league_id" class="form-select form-select-sm">
                <option value="">-- Nessuna --</option>
                {% for league in leagues %}
                  <option value="{{ league.id }}" {% if team.league_id == league.id %}selected{% endif %}>
                    {{ league.name }}
                  </option>
                {% endfor %}
              </select>
            </td>
            <td>
              <select name="captain_id" class="form-select form-select-sm">
                <option value="">-- Nessuno --</option>
                {% for captain in captains %}
                  <option value="{{ captain.zwift_power_id }}"
                    {% if team.captain_zwift_id == captain.zwift_power_id %}selected{% endif %}>
                    {{ captain.name }}
                  </option>
                {% endfor %}
              </select>
            </td>
            <td>
              <a href="{{ url_for('admin.manage_team_members', team_id=team.id) }}"
                 class="btn btn-outline-primary btn-sm">👥 Gestisci</a>
            </td>
            <td>
              <button type="submit" class="btn btn-outline-success btn-sm">💾</button>
            </td>
          </form>
          <td>
            <form method="POST" action="{{ url_for('admin.manage_teams') }}" 
                  onsubmit="return confirm('Eliminare il team {{ team.name }}?');">
              <input type="hidden" name="action" value="delete">
              <input type="hidden" name="team_id" value="{{ team.id }}">
              <button type="submit" class="btn btn-outline-danger btn-sm">🗑️</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
