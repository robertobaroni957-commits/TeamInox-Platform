<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team INOX - Profilo Utente</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        inox: {
                            dark: '#0d0f11',
                            card: '#1a1d20',
                            orange: '#fc6719',
                            blue: '#048ea0',
                            cyan: '#00f0ff',
                            text: '#f0f0f0',
                            gray: '#888888'
                        }
                    },
                    fontFamily: {
                        display: ['Teko', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;500;600;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="sidebar.css?v=1.6" type="text/css"> 
    
</head>
<body>

    <video autoplay muted loop id="background-video">
        <source src="https://www.teaminox.it/wp-content/uploads/2025/11/Presentazione-2025-.mp4" type="video/mp4">
    </video>

    <button id="menu-toggle" class="lg:hidden fixed top-4 left-4 z-[100] p-2 bg-inox-card rounded-md shadow-2xl border border-gray-700">
        <svg id="menu-icon-open" class="w-6 h-6 text-inox-orange block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
        <svg id="menu-icon-close" class="w-6 h-6 text-inox-orange hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>

    <div id="sidebar-overlay" class="hidden"></div>

    <div id="main-layout">

        <aside id="sidebar">
            <!-- Sidebar content will be loaded by sidebar.js -->
        </aside>

        <div id="main-content">
            
            <nav id="top-nav" class="bg-inox-card border-b border-gray-700 shadow-lg hidden lg:block w-full">
                 <!-- Top nav content can be loaded dynamically if needed -->
            </nav>

            <main class="w-full p-4 sm:p-6 lg:p-6 pt-16 lg:pt-6">
                
                <section id="profile-section" class="bg-inox-card rounded-xl p-6 sm:p-8 mb-10 card-shadow border-l-4 border-inox-orange">
                    <h2 class="text-4xl sm:text-5xl font-extrabold mb-6 text-white inox-font tracking-tight">
                        Profilo Admin
                    </h2>
                    <p class="text-gray-300 mb-8 max-w-lg text-sm sm:text-base">
                        Gestisci le tue credenziali di ZwiftPower per l'importazione dei dati delle gare. Le credenziali sono salvate in modo sicuro e non sono visibili a nessuno.
                    </p>
                    
                    <form id="profile-form" class="space-y-6 max-w-md">
                        <div>
                            <label for="zwift_username" class="block text-sm font-medium text-inox-gray mb-2">Username ZwiftPower</label>
                            <input type="text" id="zwift_username" name="zwift_username" autocomplete="username" required 
                                   class="w-full bg-inox-dark text-white border border-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-inox-orange focus:outline-none">
                        </div>
                        
                        <div>
                            <label for="zwift_password" class="block text-sm font-medium text-inox-gray mb-2">Password ZwiftPower</label>
                            <input type="password" id="zwift_password" name="zwift_password" autocomplete="new-password" 
                                   class="w-full bg-inox-dark text-white border border-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-inox-orange focus:outline-none">
                            <p class="text-xs text-gray-500 mt-2">Lascia vuoto per non modificare la password esistente.</p>
                        </div>

                        <div>
                            <button type="submit" id="save-button"
                                    class="bg-inox-orange hover:bg-red-500 text-black font-bold py-2 px-6 rounded-lg text-sm transition transform hover:scale-105">
                                Salva Credenziali
                            </button>
                        </div>
                    </form>
                    
                    <div id="status-message" class="mt-6 text-sm"></div>

                </section>
                
            </main>
        </div>
    </div>

    <script src="sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('jwt_token');

            // 1. Auth check
            if (!token) {
                window.location.href = '/index.html';
                return;
            }

            const form = document.getElementById('profile-form');
            const usernameInput = document.getElementById('zwift_username');
            const passwordInput = document.getElementById('zwift_password');
            const statusMessage = document.getElementById('status-message');
            const saveButton = document.getElementById('save-button');

            // 2. Fetch current Zwift username
            fetch('/api/user/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Non autorizzato o errore del server.');
                }
                return response.json();
            })
            .then(data => {
                if (data.zwift_username) {
                    usernameInput.value = data.zwift_username;
                }
            })
            .catch(error => {
                statusMessage.innerHTML = `<span class="text-red-500">Errore nel caricamento del profilo: ${error.message}</span>`;
            });

            // 3. Handle form submission
            form.addEventListener('submit', (event) => {
                event.preventDefault();
                saveButton.disabled = true;
                saveButton.textContent = 'Salvataggio...';
                statusMessage.textContent = '';

                const zwift_username = usernameInput.value;
                const zwift_password = passwordInput.value;
                
                const payload = { zwift_username };
                // Includi la password solo se è stata inserita
                if (zwift_password) {
                    payload.zwift_password = zwift_password;
                }

                fetch('/api/user/profile', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.error || 'Errore durante il salvataggio.'); });
                    }
                    return response.json();
                })
                .then(data => {
                    statusMessage.innerHTML = `<span class="text-green-500">${data.message}</span>`;
                    // Pulisci il campo password dopo il salvataggio
                    passwordInput.value = '';
                })
                .catch(error => {
                    statusMessage.innerHTML = `<span class="text-red-500">Errore: ${error.message}</span>`;
                })
                .finally(() => {
                    saveButton.disabled = false;
                    saveButton.textContent = 'Salva Credenziali';
                });
            });
        });
    </script>

</body>
</html>
